<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Catalog — Turn any URL into a macOS app</title>
<meta name="description" content="Catalog turns any website into a real macOS app — Spotlight-searchable, dockable, with its own cookies. Free for personal use." />
<meta property="og:title" content="Catalog — Turn any URL into a macOS app" />
<meta property="og:description" content="Spotlight-searchable. Dockable. Sessions don't bleed across sites. Free, personal use." />

<style>
  :root { color-scheme: light; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #F5F2EC;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
  }

  a.cta-primary {
    display: inline-flex; align-items: center; gap: 12px;
    height: 60px; padding: 0 32px;
    background: #FF6B35; color: #fff;
    border-radius: 14px;
    font-size: 19px; font-weight: 600; letter-spacing: -0.2px;
    text-decoration: none;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 12px 28px rgba(255,107,53,0.32), inset 0 1px 0 rgba(255,255,255,0.18);
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
  }
  a.cta-primary:hover {
    background: #FF7E50;
    transform: translateY(-1px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 16px 36px rgba(255,107,53,0.36), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  a.cta-primary:active {
    transform: translateY(0);
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 6px 16px rgba(255,107,53,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
  }

  a.cta-secondary {
    display: inline-flex; align-items: center; gap: 8px;
    height: 40px; padding: 0 18px;
    background: #FF6B35; color: #fff;
    border-radius: 10px;
    font-size: 14px; font-weight: 600; letter-spacing: -0.1px;
    text-decoration: none;
    box-shadow: 0 6px 16px rgba(255,107,53,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
  }
  a.cta-secondary:hover {
    background: #FF7E50;
    transform: translateY(-1px);
  }
  a.link-muted {
    color: rgba(0,0,0,0.56); text-decoration: none;
    transition: color 100ms ease;
  }
  a.link-muted:hover { color: rgba(0,0,0,0.85); }

  .feature-card {
    background: #fff; border-radius: 16px; padding: 28px 26px;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.03), 0 6px 18px rgba(0,0,0,0.04);
    display: flex; flex-direction: column; gap: 14px;
    transition: transform 160ms ease, box-shadow 160ms ease;
  }
  .feature-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04), 0 10px 28px rgba(0,0,0,0.06);
  }

  .install-block {
    display: inline-flex; align-items: center;
    gap: 0;
    background: rgba(0,0,0,0.055);
    border: 0.5px solid rgba(0,0,0,0.10);
    border-radius: 12px;
    overflow: hidden;
    max-width: 100%;
  }
  .install-cmd {
    padding: 0 20px;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 14px; color: rgba(0,0,0,0.78);
    letter-spacing: -0.1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    user-select: all;
  }
  .install-copy {
    flex-shrink: 0;
    height: 44px; width: 44px;
    display: flex; align-items: center; justify-content: center;
    border-left: 0.5px solid rgba(0,0,0,0.10);
    background: transparent;
    cursor: pointer;
    transition: background 120ms ease;
    color: rgba(0,0,0,0.45);
  }
  .install-copy:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.70); }
  .install-copy:active { background: rgba(0,0,0,0.10); }

  .install-block-sm {
    display: inline-flex; align-items: center;
    background: rgba(0,0,0,0.055);
    border: 0.5px solid rgba(0,0,0,0.10);
    border-radius: 10px; overflow: hidden;
    max-width: 100%;
  }
  .install-cmd-sm {
    padding: 0 16px;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px; color: rgba(0,0,0,0.70);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    user-select: all;
  }
  .install-copy-sm {
    flex-shrink: 0;
    height: 36px; width: 36px;
    display: flex; align-items: center; justify-content: center;
    border-left: 0.5px solid rgba(0,0,0,0.10);
    background: transparent; cursor: pointer;
    transition: background 120ms ease;
    color: rgba(0,0,0,0.40);
  }
  .install-copy-sm:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.65); }

  @media (max-width: 760px) {
    .two-col { grid-template-columns: 1fr !important; }
    .three-col { grid-template-columns: 1fr 1fr !important; }
    .hero-title { font-size: 56px !important; letter-spacing: -2px !important; }
    .section-title { font-size: 34px !important; }
  }
  @media (max-width: 480px) {
    .three-col { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// ─── Design tokens ────────────────────────────────────────────────────────────
const T = {
  font: '-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif',
  fontMono: '"SF Mono", ui-monospace, Menlo, Consolas, monospace',
  tlRed: '#FF5F57', tlYellow: '#FEBC2E', tlGreen: '#28C840',
  accent: '#FF6B35', accentMuted: 'rgba(255,107,53,0.12)',
  text: 'rgba(0,0,0,0.85)', text2: 'rgba(0,0,0,0.56)', text3: 'rgba(0,0,0,0.36)',
  sep: 'rgba(0,0,0,0.08)', sepStrong: 'rgba(0,0,0,0.14)',
  green: '#34C759',
};

const LP = {
  bg: '#F5F2EC', card: '#ffffff',
  ...T,
  maxW: 960,
};

const INSTALL_CMD = 'curl -fsSL https://raw.githubusercontent.com/Daekyo-Jeong/catalog/main/install.sh | bash';
const DMG_URL = 'https://github.com/Daekyo-Jeong/catalog/releases/download/v0.1.0/Catalog-0.1.0-arm64.dmg';
const REPO_URL = 'https://github.com/Daekyo-Jeong/catalog';

function useCopy(text) {
  const [copied, setCopied] = React.useState(false);
  const copy = React.useCallback(() => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    });
  }, [text]);
  return [copied, copy];
}

// ─── Squircle (continuous corner) ────────────────────────────────────────────
function Squircle({ size = 64, bg = '#000', children, style = {}, shadow = true }) {
  const id = React.useId();
  const d = 'M 50 0 C 9 0 0 9 0 50 C 0 91 9 100 50 100 C 91 100 100 91 100 50 C 100 9 91 0 50 0 Z';
  return (
    <div style={{
      width: size, height: size, position: 'relative', flexShrink: 0,
      filter: shadow ? 'drop-shadow(0 1px 1px rgba(0,0,0,0.10)) drop-shadow(0 2px 4px rgba(0,0,0,0.08))' : 'none',
      ...style,
    }}>
      <svg viewBox="0 0 100 100" width={size} height={size} style={{ display: 'block', position: 'absolute', inset: 0 }}>
        <defs>
          <linearGradient id={`hl-${id}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#fff" />
            <stop offset="100%" stopColor="#fff" stopOpacity="0" />
          </linearGradient>
          <clipPath id={`sq-${id}`}><path d={d} /></clipPath>
        </defs>
        <g clipPath={`url(#sq-${id})`}>
          <rect width="100" height="100" fill={bg} />
          <rect width="100" height="50" fill={`url(#hl-${id})`} opacity="0.18" />
        </g>
        <path d={d} fill="none" stroke="rgba(0,0,0,0.10)" strokeWidth="0.8" />
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex',
        alignItems: 'center', justifyContent: 'center',
        color: '#fff', fontFamily: T.font, fontWeight: 600,
        fontSize: size * 0.5, letterSpacing: -0.6, lineHeight: 1,
        paddingTop: Math.round(size * 0.02),
      }}>
        {children}
      </div>
    </div>
  );
}

// ─── Catalog brand icon ───────────────────────────────────────────────────────
function CatalogIcon({ size = 64 }) {
  const gid = React.useId();
  return (
    <div style={{
      width: size, height: size, position: 'relative', flexShrink: 0,
      filter: 'drop-shadow(0 2px 6px rgba(232,75,31,0.28)) drop-shadow(0 1px 2px rgba(0,0,0,0.12))',
    }}>
      <svg viewBox="0 0 100 100" width={size} height={size} style={{ display: 'block', position: 'absolute', inset: 0 }}>
        <defs>
          <linearGradient id={`cg-${gid}`} x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#FF8C5A" />
            <stop offset="100%" stopColor="#E84B1F" />
          </linearGradient>
          <linearGradient id={`hl-${gid}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#fff" />
            <stop offset="100%" stopColor="#fff" stopOpacity="0" />
          </linearGradient>
          <clipPath id={`sq-${gid}`}>
            <path d="M 50 0 C 9 0 0 9 0 50 C 0 91 9 100 50 100 C 91 100 100 91 100 50 C 100 9 91 0 50 0 Z" />
          </clipPath>
        </defs>
        <g clipPath={`url(#sq-${gid})`}>
          <rect width="100" height="100" fill={`url(#cg-${gid})`} />
          <rect width="100" height="50" fill={`url(#hl-${gid})`} opacity="0.18" />
        </g>
        <path d="M 50 0 C 9 0 0 9 0 50 C 0 91 9 100 50 100 C 91 100 100 91 100 50 C 100 9 91 0 50 0 Z"
          fill="none" stroke="rgba(0,0,0,0.10)" strokeWidth="0.8" />
      </svg>
      {/* 2×2 grid mark */}
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr',
          gap: size * 0.065,
          padding: size * 0.22,
        }}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{
              width: size * 0.22, height: size * 0.22,
              borderRadius: size * 0.05,
              background: 'rgba(255,255,255,0.95)',
              boxShadow: 'inset 0 0 0 1px rgba(0,0,0,0.04)',
            }} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── App letter marks ─────────────────────────────────────────────────────────
const APPS = {
  slack:   { color: '#4A154B', mark: 'S' },
  figma:   { color: '#0D0D0D', mark: 'F' },
  linear:  { color: '#5E6AD2', mark: 'L' },
  notion:  { color: '#1F1F1F', mark: 'N' },
  github:  { color: '#24292E', mark: 'G' },
  spotify: { color: '#1DB954', mark: 'S' },
};

function AppMark({ id, size = 28, shadow = false }) {
  const a = APPS[id];
  if (!a) return null;
  return (
    <Squircle size={size} bg={a.color} shadow={shadow}>
      <span style={{ fontWeight: 600, fontSize: size * 0.52, lineHeight: 1 }}>{a.mark}</span>
    </Squircle>
  );
}

// ─── Traffic lights ───────────────────────────────────────────────────────────
function TrafficLights({ size = 11 }) {
  return (
    <div style={{ display: 'flex', gap: 7, alignItems: 'center', flexShrink: 0 }}>
      {[T.tlRed, T.tlYellow, T.tlGreen].map((c, i) => (
        <div key={i} style={{
          width: size, height: size, borderRadius: size,
          background: c, boxShadow: 'inset 0 0 0 0.5px rgba(0,0,0,0.10)',
        }} />
      ))}
    </div>
  );
}

// ─── Icon components ──────────────────────────────────────────────────────────
function DownloadArrow({ size = 20 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
      <path d="M10 3v11M5 10l5 5 5-5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
      <path d="M3.5 17.5h13" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" />
    </svg>
  );
}

// Copy icon
function CopyIcon({ size = 16, checked = false }) {
  if (checked) return (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <path d="M3 8.5L6.5 12 13 4.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
  return (
    <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
      <rect x="5.5" y="5.5" width="7" height="8" rx="1.2" stroke="currentColor" strokeWidth="1.5" />
      <path d="M3.5 10.5V3.5a1 1 0 011-1h6.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" />
    </svg>
  );
}

// Hero install block
function InstallBlock({ style = {} }) {
  const [copied, copy] = useCopy(INSTALL_CMD);
  return (
    <div className="install-block" style={{ height: 44, ...style }}>
      <span className="install-cmd">{INSTALL_CMD}</span>
      <button className="install-copy" onClick={copy} title="Copy" style={{ border: 'none' }}>
        <CopyIcon size={15} checked={copied} />
      </button>
    </div>
  );
}

// Footer install block (smaller)
function InstallBlockSm() {
  const [copied, copy] = useCopy(INSTALL_CMD);
  return (
    <div className="install-block-sm" style={{ height: 36 }}>
      <span className="install-cmd-sm">{INSTALL_CMD}</span>
      <button className="install-copy-sm" onClick={copy} title="Copy" style={{ border: 'none' }}>
        <CopyIcon size={13} checked={copied} />
      </button>
    </div>
  );
}

function SearchIcon({ size = 20 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
      <circle cx="9" cy="9" r="5.5" stroke="rgba(0,0,0,0.36)" strokeWidth="1.8" />
      <path d="M13 13l4 4" stroke="rgba(0,0,0,0.36)" strokeWidth="1.8" strokeLinecap="round" />
    </svg>
  );
}

function Spinner() {
  return (
    <svg width={13} height={13} viewBox="0 0 16 16" style={{ display: 'block' }}>
      <circle cx="8" cy="8" r="6" stroke="rgba(0,0,0,0.10)" strokeWidth="1.6" fill="none" />
      <path d="M14 8a6 6 0 00-6-6" stroke={T.accent} strokeWidth="1.6" fill="none" strokeLinecap="round" />
    </svg>
  );
}

// ─── Feature icon glyphs ──────────────────────────────────────────────────────
function FeatureIcon({ name, size = 24 }) {
  const s = { display: 'block' };
  const base = { width: size, height: size, viewBox: '0 0 28 28', fill: 'none', stroke: 'currentColor', strokeWidth: '1.6', strokeLinecap: 'round', strokeLinejoin: 'round', style: s };
  switch (name) {
    case 'spotlight': return <svg {...base}><circle cx="12" cy="12" r="6.5" /><path d="M16.8 16.8l5.2 5.2" /></svg>;
    case 'jars': return <svg {...base}><rect x="3" y="9" width="8" height="14" rx="1.6" /><rect x="13" y="5" width="8" height="18" rx="1.6" /><path d="M3 13h8M13 9h8" /></svg>;
    case 'window': return <svg {...base}><rect x="3" y="5" width="22" height="18" rx="2.2" /><path d="M3 10h22" /><circle cx="6.5" cy="7.5" r="0.9" fill="currentColor" stroke="none" /><circle cx="9.2" cy="7.5" r="0.9" fill="currentColor" stroke="none" /><circle cx="11.9" cy="7.5" r="0.9" fill="currentColor" stroke="none" /></svg>;
    case 'autoicon': return <svg {...base}><rect x="5" y="5" width="18" height="18" rx="4.2" /><path d="M14 11v6M11 14h6" /></svg>;
    case 'reset': return <svg {...base}><path d="M22 7v6h-6" /><path d="M22 13a8 8 0 10-3 6.2" /></svg>;
    case 'tags': return <svg {...base}><path d="M14.5 4H22v7.5L12 21.5 4.5 14 14.5 4z" /><circle cx="18" cy="8" r="1.2" /></svg>;
    default: return null;
  }
}

// After: clean SSB window with Dock

function StepMock({ kind }) {
  if (kind === 'paste')    return <NewAppModal state="empty" />;
  if (kind === 'extract')  return <NewAppModal state="extracting" />;
  if (kind === 'spotlight') return <SpotlightMock />;
  return null;
}
