<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Catalog · Grid preview</title>
<!--
  Standalone preview of the manager grid layout. No build, no Electron — just
  open this file directly in a browser to iterate on icon sizing, padding,
  label typography, and hover/selection states.

  IMPORTANT: This is a visual scaffold for design iteration only. The real app
  lives in src/renderer/ — once a layout looks right here, transfer the
  numbers into src/renderer/components/GridView.jsx + Squircle.jsx.
-->
<style>
  :root {
    --bg: #f5f5f5;
    --card-hover: #f7f7f7;
    --text: rgba(0,0,0,0.85);
    --text-2: rgba(0,0,0,0.56);
    --text-3: rgba(0,0,0,0.36);
    --accent: #FF6B35;
    --accent-muted: rgba(255,107,53,0.12);

    /* --- Dial these numbers, then port to GridView.jsx --- */
    --icon-size: 96px;       /* AppMark size */
    --cell-min: 112px;       /* minmax(cell-min, 1fr) */
    --cell-max: 128px;       /* per-tile max width */
    --grid-gap: 4px;         /* gap between tiles */
    --label-gap: 8px;        /* between icon and label */
    --grid-padding: 20px 24px 32px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1c;
      --card-hover: #2d2d2f;
      --text: rgba(255,255,255,0.92);
      --text-2: rgba(255,255,255,0.60);
      --text-3: rgba(255,255,255,0.36);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .grid {
    padding: var(--grid-padding);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--cell-min), 1fr));
    gap: var(--grid-gap);
    justify-content: start;
  }
  .cell {
    max-width: var(--cell-max);
    min-width: 0;
  }
  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--label-gap);
    cursor: default;
    -webkit-user-select: none;
    user-select: none;
  }
  .squircle {
    width: var(--icon-size);
    height: var(--icon-size);
    display: block;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.10)) drop-shadow(0 2px 4px rgba(0,0,0,0.08));
    flex-shrink: 0;
  }
  .label {
    text-align: center;
    width: 100%;
    min-width: 0;
  }
  .name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.25;
    color: var(--text);
    padding: 1.5px 4px;
    border-radius: 5px;
    display: inline-block;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tile.selected .name {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    padding: 1.5px 8px;
    margin: 0 -4px;
  }
  .url {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  /* Controls bar for live tweaks */
  .controls {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
    padding: 12px 24px;
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 12px; color: var(--text-2);
  }
  .controls label { display: flex; align-items: center; gap: 6px; }
  .controls input[type="range"] { width: 120px; }
  .controls .val { min-width: 48px; font-variant-numeric: tabular-nums; color: var(--text); }
</style>
</head>
<body>
  <div class="controls">
    <label>icon-size <input type="range" min="48" max="160" value="96" data-var="--icon-size" data-suffix="px" /><span class="val">96px</span></label>
    <label>cell-min <input type="range" min="80" max="200" value="112" data-var="--cell-min" data-suffix="px" /><span class="val">112px</span></label>
    <label>cell-max <input type="range" min="80" max="240" value="128" data-var="--cell-max" data-suffix="px" /><span class="val">128px</span></label>
    <label>grid-gap <input type="range" min="0" max="24" value="4" data-var="--grid-gap" data-suffix="px" /><span class="val">4px</span></label>
    <label>label-gap <input type="range" min="0" max="24" value="8" data-var="--label-gap" data-suffix="px" /><span class="val">8px</span></label>
  </div>

  <div class="grid" id="grid"></div>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <clipPath id="sq" clipPathUnits="objectBoundingBox">
        <path d="M0.5 0 C0.8074 0 0.9186 0 0.9559 0.0441 C0.9932 0.0883 1 0.1994 1 0.5 C1 0.8006 0.9932 0.9117 0.9559 0.9559 C0.9186 1 0.8074 1 0.5 1 C0.1926 1 0.0814 1 0.0441 0.9559 C0.0068 0.9117 0 0.8006 0 0.5 C0 0.1994 0.0068 0.0883 0.0441 0.0441 C0.0814 0 0.1926 0 0.5 0 Z" />
      </clipPath>
    </defs>
  </svg>

  <script>
    // Sample apps — use a mix of color/identity so different favicon styles
    // (transparent vs colored bg, dense vs sparse) all get exercised.
    const APPS = [
      { name: 'flex', url: 'flex.team/home', color: '#0d0d0d', mark: 'F' },
      { name: 'google chat', url: 'chat.google.com', color: '#5BB974', mark: 'G' },
      { name: 'worktimer', url: 'show.hnine.com/interaction/worktime-server', color: '#cccccc', mark: 'W' },
      { name: 'Notion', url: 'www.notion.so', color: '#1F1F1F', mark: 'N' },
      { name: 'Figma', url: 'www.figma.com', color: '#0D0D0D', mark: 'F' },
      { name: 'Linear', url: 'linear.app', color: '#5E6AD2', mark: 'L' },
      { name: 'Slack', url: 'app.slack.com', color: '#4A154B', mark: 'S' },
      { name: 'Gmail', url: 'mail.google.com', color: '#D93025', mark: 'M' },
      { name: 'Claude', url: 'claude.ai', color: '#C96442', mark: 'C' },
      { name: 'GitHub', url: 'github.com', color: '#24292E', mark: 'G' },
    ];

    const grid = document.getElementById('grid');
    APPS.forEach((app, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.innerHTML = `
        <div class="tile ${i === 2 ? 'selected' : ''}">
          <svg class="squircle" viewBox="0 0 100 100">
            <defs>
              <clipPath id="sq-${i}"><path d="M50 0 C80.74 0 91.86 0 95.59 4.41 C99.32 8.83 100 19.94 100 50 C100 80.06 99.32 91.17 95.59 95.59 C91.86 100 80.74 100 50 100 C19.26 100 8.14 100 4.41 95.59 C0.68 91.17 0 80.06 0 50 C0 19.94 0.68 8.83 4.41 4.41 C8.14 0 19.26 0 50 0 Z"/></clipPath>
            </defs>
            <g clip-path="url(#sq-${i})">
              <rect width="100" height="100" fill="${app.color}"/>
              <rect width="100" height="50" fill="url(#hl)" opacity="0.18"/>
            </g>
            <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
                  fill="white" font-size="52" font-weight="600"
                  font-family="-apple-system, system-ui, sans-serif">${app.mark}</text>
            <path d="M50 0 C80.74 0 91.86 0 95.59 4.41 C99.32 8.83 100 19.94 100 50 C100 80.06 99.32 91.17 95.59 95.59 C91.86 100 80.74 100 50 100 C19.26 100 8.14 100 4.41 95.59 C0.68 91.17 0 80.06 0 50 C0 19.94 0.68 8.83 4.41 4.41 C8.14 0 19.26 0 50 0 Z"
                  fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="0.8"/>
          </svg>
          <div class="label">
            <span class="name">${app.name}</span>
            <div class="url">${app.url}</div>
          </div>
        </div>
      `;
      grid.appendChild(cell);
    });

    // Live tuning: each range updates a CSS variable on :root, so all tiles
    // re-render instantly without page reload.
    document.querySelectorAll('.controls input').forEach(input => {
      const valEl = input.nextElementSibling;
      const sync = () => {
        const v = `${input.value}${input.dataset.suffix || ''}`;
        document.documentElement.style.setProperty(input.dataset.var, v);
        valEl.textContent = v;
      };
      input.addEventListener('input', sync);
      sync();
    });
  </script>
</body>
</html>
