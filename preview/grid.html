<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Urly · Grid preview</title>
<!--
  Standalone preview of the manager grid layout. No build, no Electron — just
  open this file directly in a browser to iterate on icon sizing, padding,
  label typography, and hover/selection states.

  IMPORTANT: This is a visual scaffold for design iteration only. The real app
  lives in src/renderer/ — once a layout looks right here, transfer the
  numbers into src/renderer/components/GridView.jsx + Squircle.jsx.
-->
<style>
  :root {
    --bg: #f5f5f5;
    --card-hover: #f7f7f7;
    --text: rgba(0,0,0,0.85);
    --text-2: rgba(0,0,0,0.56);
    --text-3: rgba(0,0,0,0.36);
    --accent: #FF6B35;
    --accent-muted: rgba(255,107,53,0.12);

    /* --- Dial these numbers, then port to GridView.jsx --- */
    --icon-size: 96px;       /* AppMark size (== tile width) */
    --column-gap: 24px;      /* horizontal space between tiles */
    --row-gap: 20px;         /* vertical space between rows */
    --label-gap: 8px;        /* between icon and label */
    --grid-padding: 20px 24px 32px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1c;
      --card-hover: #2d2d2f;
      --text: rgba(255,255,255,0.92);
      --text-2: rgba(255,255,255,0.60);
      --text-3: rgba(255,255,255,0.36);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .grid {
    padding: var(--grid-padding);
    display: grid;
    grid-template-columns: repeat(auto-fill, var(--icon-size));
    column-gap: var(--column-gap);
    row-gap: var(--row-gap);
    justify-content: start;
  }
  .cell {
    width: var(--icon-size);
    min-width: 0;
    position: relative;
  }
  .menu-btn {
    position: absolute;
    top: -4px; right: -4px;
    width: 24px; height: 24px;
    border-radius: 12px;
    background: #fff;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.14),
                0 1px 3px rgba(0,0,0,0.18),
                0 2px 6px rgba(0,0,0,0.12);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
    cursor: default;
  }
  @media (prefers-color-scheme: dark) {
    .menu-btn { background: rgba(255,255,255,0.16); }
  }
  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--label-gap);
    cursor: default;
    -webkit-user-select: none;
    user-select: none;
  }
  .squircle {
    width: var(--icon-size);
    height: var(--icon-size);
    display: block;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.10)) drop-shadow(0 2px 4px rgba(0,0,0,0.08));
    flex-shrink: 0;
  }
  .label {
    text-align: center;
    width: 100%;
    min-width: 0;
  }
  .name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.25;
    color: var(--text);
    padding: 1.5px 4px;
    border-radius: 5px;
    display: inline-block;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tile.selected .name {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    padding: 1.5px 8px;
    margin: 0 -4px;
  }
  .url {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  /* Controls bar for live tweaks */
  .controls {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
    padding: 12px 24px;
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 12px; color: var(--text-2);
  }
  .controls label { display: flex; align-items: center; gap: 6px; }
  .controls input[type="range"] { width: 120px; }
  .controls .val { min-width: 48px; font-variant-numeric: tabular-nums; color: var(--text); }
</style>
</head>
<body>
  <div class="controls">
    <label>icon-size <input type="range" min="48" max="160" value="96" data-var="--icon-size" data-suffix="px" /><span class="val">96px</span></label>
    <label>column-gap <input type="range" min="0" max="48" value="24" data-var="--column-gap" data-suffix="px" /><span class="val">24px</span></label>
    <label>row-gap <input type="range" min="0" max="48" value="20" data-var="--row-gap" data-suffix="px" /><span class="val">20px</span></label>
    <label>label-gap <input type="range" min="0" max="24" value="8" data-var="--label-gap" data-suffix="px" /><span class="val">8px</span></label>
  </div>

  <div class="grid" id="grid"></div>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#fff" />
        <stop offset="100%" stop-color="#fff" stop-opacity="0" />
      </linearGradient>
    </defs>
  </svg>

  <script>
    // The exact squircle path from Figma node 13:131 — same shape that
    // ships in assets/icon-source.svg and renders in the manager's Squircle
    // component. Coordinates are 0–1024.
    const SQUIRCLE_D = 'M0.000976562 373.001V651.001C0.000976562 665.251 -0.00894336 679.491 0.0810547 693.73C0.151055 705.72 0.280352 717.721 0.610352 729.711C1.32035 755.851 2.85099 782.211 7.50098 808.051C12.2109 834.271 19.9104 858.67 32.0303 882.49C43.9502 905.9 59.5307 927.32 78.1006 945.9C96.6706 964.48 118.101 980.051 141.511 991.971C165.331 1004.1 189.73 1011.79 215.95 1016.5C241.8 1021.14 268.161 1022.68 294.291 1023.39C306.281 1023.71 318.271 1023.85 330.271 1023.92C342.739 1023.99 355.201 1024 367.661 1024H654.054C667.285 1024 680.508 1024 693.73 1023.92C705.72 1023.85 717.721 1023.72 729.711 1023.39C755.851 1022.68 782.211 1021.15 808.051 1016.5C834.271 1011.79 858.67 1004.09 882.49 991.971C905.9 980.051 927.32 964.47 945.9 945.9C964.48 927.33 980.051 905.9 991.971 882.49C1004.1 858.67 1011.79 834.271 1016.5 808.051C1021.14 782.201 1022.68 755.841 1023.39 729.711C1023.71 717.721 1023.85 705.73 1023.92 693.73C1023.99 681.262 1024 668.801 1024 656.341V369.948C1024 356.717 1024 343.494 1023.92 330.271C1023.85 318.281 1023.72 306.281 1023.39 294.291C1022.68 268.151 1021.15 241.79 1016.5 215.95C1011.79 189.73 1004.09 165.331 991.971 141.511C980.051 118.101 964.47 96.6806 945.9 78.1006C927.33 59.5207 905.9 43.9502 882.49 32.0303C858.67 19.9004 834.271 12.2109 808.051 7.50098C782.201 2.86099 755.841 1.32035 729.711 0.610352C717.721 0.290352 705.73 0.151055 693.73 0.0810547C679.481 0.00105635 665.241 0.000976563 651.001 0.000976562H373.001C358.761 0.000976562 344.521 0.00105469 330.271 0.0810547C318.281 0.151054 306.281 0.28036 294.291 0.610352C268.151 1.32035 241.79 2.85098 215.95 7.50098C189.73 12.211 165.331 19.9104 141.511 32.0303C118.101 43.9503 96.6806 59.5306 78.1006 78.1006C59.5206 96.6706 43.9503 118.101 32.0303 141.511C19.9004 165.331 12.211 189.73 7.50098 215.95C2.86098 241.8 1.32035 268.161 0.610352 294.291C0.29036 306.281 0.151054 318.271 0.0810547 330.271C0.00105469 344.521 0.000976562 358.761 0.000976562 373.001Z';

    // Sample apps — use a mix of color/identity so different favicon styles
    // (transparent vs colored bg, dense vs sparse) all get exercised.
    const APPS = [
      { name: 'flex', url: 'flex.team/home', color: '#0d0d0d', mark: 'F' },
      { name: 'google chat', url: 'chat.google.com', color: '#5BB974', mark: 'G' },
      { name: 'worktimer', url: 'show.hnine.com/interaction/worktime-server', color: '#cccccc', mark: 'W' },
      { name: 'Notion', url: 'www.notion.so', color: '#1F1F1F', mark: 'N' },
      { name: 'Figma', url: 'www.figma.com', color: '#0D0D0D', mark: 'F' },
      { name: 'Linear', url: 'linear.app', color: '#5E6AD2', mark: 'L' },
      { name: 'Slack', url: 'app.slack.com', color: '#4A154B', mark: 'S' },
      { name: 'Gmail', url: 'mail.google.com', color: '#D93025', mark: 'M' },
      { name: 'Claude', url: 'claude.ai', color: '#C96442', mark: 'C' },
      { name: 'GitHub', url: 'github.com', color: '#24292E', mark: 'G' },
    ];

    const grid = document.getElementById('grid');
    APPS.forEach((app, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const isSelected = i === 2;
      cell.innerHTML = `
        <div class="tile ${isSelected ? 'selected' : ''}">
          ${isSelected ? `
            <div class="menu-btn" title="actions">
              <svg width="14" height="14" viewBox="0 0 16 16">
                <circle cx="3.5" cy="8" r="1.1" fill="currentColor"/>
                <circle cx="8" cy="8" r="1.1" fill="currentColor"/>
                <circle cx="12.5" cy="8" r="1.1" fill="currentColor"/>
              </svg>
            </div>
          ` : ''}
          <svg class="squircle" viewBox="0 0 1024 1024">
            <defs>
              <clipPath id="sq-${i}"><path d="${SQUIRCLE_D}"/></clipPath>
            </defs>
            <g clip-path="url(#sq-${i})">
              <rect width="1024" height="1024" fill="${app.color}"/>
              <rect width="1024" height="512" fill="url(#hl)" opacity="0.18"/>
            </g>
            <text x="512" y="512" text-anchor="middle" dominant-baseline="central"
                  fill="white" font-size="540" font-weight="600"
                  font-family="-apple-system, system-ui, sans-serif">${app.mark}</text>
            <path d="${SQUIRCLE_D}" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="0.8"/>
          </svg>
          <div class="label">
            <span class="name">${app.name}</span>
            <div class="url">${app.url}</div>
          </div>
        </div>
      `;
      grid.appendChild(cell);
    });

    // Live tuning: each range updates a CSS variable on :root, so all tiles
    // re-render instantly without page reload.
    document.querySelectorAll('.controls input').forEach(input => {
      const valEl = input.nextElementSibling;
      const sync = () => {
        const v = `${input.value}${input.dataset.suffix || ''}`;
        document.documentElement.style.setProperty(input.dataset.var, v);
        valEl.textContent = v;
      };
      input.addEventListener('input', sync);
      sync();
    });
  </script>
</body>
</html>
